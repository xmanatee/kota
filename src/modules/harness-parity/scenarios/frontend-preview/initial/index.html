<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KOTA Preview Fixture</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="summary">
        <p class="eyebrow">Preview status</p>
        <h1>Workspace sync</h1>
        <p>The latest fixture data has finished syncing.</p>
      </section>

      <section class="status-banner" data-preview-state="ready" aria-live="polite">
        <strong>Sync complete</strong>
        <span>Rendered preview evidence is ready for review.</span>
      </section>
    </main>
  </body>
</html>
