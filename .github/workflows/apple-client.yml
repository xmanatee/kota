name: Apple clients

on:
  push:
    branches: [main]
    paths:
      - 'clients/apple/**'
      - '.github/workflows/apple-client.yml'
  pull_request:
    paths:
      - 'clients/apple/**'
      - '.github/workflows/apple-client.yml'

defaults:
  run:
    working-directory: clients/apple

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Swift version
        run: swift --version

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: clients/apple/.build
          key: ${{ runner.os }}-swift-${{ hashFiles('clients/apple/Package.swift', 'clients/apple/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Build (macOS)
        run: swift build

      - name: Test (macOS)
        run: swift test

      - name: Build KotaiOS for iOS Simulator
        run: xcodebuild build -scheme KotaiOS -destination 'generic/platform=iOS Simulator' -derivedDataPath .build/ios

      - name: Test on iOS Simulator
        run: xcodebuild test -scheme KotaApple-Package -destination 'platform=iOS Simulator,name=iPhone 15' -derivedDataPath .build/ios
