name: macOS client

on:
  push:
    branches: [main]
    paths:
      - 'clients/macos/**'
      - '.github/workflows/macos-client.yml'
  pull_request:
    paths:
      - 'clients/macos/**'
      - '.github/workflows/macos-client.yml'

defaults:
  run:
    working-directory: clients/macos

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Swift version
        run: swift --version

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: clients/macos/.build
          key: ${{ runner.os }}-swift-${{ hashFiles('clients/macos/Package.swift', 'clients/macos/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Build
        run: swift build

      - name: Test
        run: swift test
